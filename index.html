<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>반다이 가챠 시뮬레이터</title>
    <link rel="stylesheet" href="style.css">
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-5680068113267734"
     crossorigin="anonymous"></script>
    <meta name="google-adsense-account" content="ca-pub-5680068113267734">
</head>
<body>
    <div class="container">
        <div class="gacha-machine">
            <!-- 상단 투명 돔 -->
            <div class="globe-container">
                <div class="inner-capsules" id="inner-capsules">
                    <!-- JS로 캡슐들이 채워집니다 -->
                </div>
            </div>
            
            <!-- 기계 몸체 -->
            <div class="machine-body">
                <div class="logo">BANDAI</div>
                
                <!-- 코인 투입구 -->
                <div class="coin-slot-area">
                    <div class="coin-slot"></div>
                    <div class="price-tag">500₩</div>
                </div>

                <!-- 레버 영역 -->
                <div class="handle-area">
                    <div class="handle" id="handle">
                        <div class="handle-bar"></div>
                        <div class="handle-center"></div>
                    </div>
                </div>

                <!-- 출구 -->
                <div class="exit-slot">
                    <div class="chute" id="chute"></div>
                </div>
            </div>
            
            <!-- 바닥 지지대 -->
            <div class="machine-base"></div>
        </div>
        
        <div class="controls">
            <button id="spin-button">레버 돌리기</button>
            <p class="instruction">레버를 클릭하거나 버튼을 눌러보세요!</p>
        </div>

        <!-- 제휴 문의 섹션 -->
        <div class="contact-section">
            <h3>🤝 제휴 문의</h3>
            <form action="https://formspree.io/f/xnjbkoko" method="POST" id="contact-form">
                <div class="form-group">
                    <input type="text" name="name" placeholder="성함/업체명" required>
                </div>
                <div class="form-group">
                    <input type="email" name="_replyto" placeholder="이메일 주소" required>
                </div>
                <div class="form-group">
                    <textarea name="message" placeholder="문의 내용 (예: 가챠 기계 커스텀 제작 문의 등)" required></textarea>
                </div>
                <!-- 스팸 방지 및 리다이렉트 설정 (선택 사항) -->
                <input type="hidden" name="_subject" value="가챠 시뮬레이터 제휴 문의">
                
                <button type="submit" class="submit-btn">문의 보내기</button>
                <p id="form-status"></p>
            </form>
        </div>

        <!-- Disqus 댓글 섹션 -->
        <div class="comments-section">
            <h3>💬 댓글</h3>
            <div id="disqus_thread"></div>
            <script>
                /**
                *  RECOMMENDED CONFIGURATION VARIABLES: EDIT AND UNCOMMENT THE SECTION BELOW TO INSERT DYNAMIC VALUES FROM YOUR PLATFORM OR CMS.
                *  LEARN WHY DEFINING THESE VARIABLES IS IMPORTANT: https://disqus.com/admin/universalcode/#configuration-variables    */
                /*
                var disqus_config = function () {
                this.page.url = PAGE_URL;  // Replace PAGE_URL with your page's canonical URL variable
                this.page.identifier = PAGE_IDENTIFIER; // Replace PAGE_IDENTIFIER with your page's unique identifier variable
                };
                */
                (function() { // DON'T EDIT BELOW THIS LINE
                var d = document, s = d.createElement('script');
                s.src = 'https://gacha-3.disqus.com/embed.js';
                s.setAttribute('data-timestamp', +new Date());
                (d.head || d.body).appendChild(s);
                })();
            </script>
            <noscript>Please enable JavaScript to view the <a href="https://disqus.com/?ref_noscript">comments powered by Disqus.</a></noscript>
        </div>
    </div>

    <!-- 결과 모달 -->
    <div id="result-modal" class="modal">
        <div class="modal-content">
            <div id="capsule-result-container" class="capsule-result-container">
                <!-- 캡슐 상단 -->
                <div id="capsule-top" class="capsule-half top"></div>
                <!-- 캡슐 하단 -->
                <div id="capsule-bottom" class="capsule-half bottom"></div>
                <!-- 내부 종이 -->
                <div id="result-paper" class="result-paper">
                    <div class="paper-content">
                        <h4>Gacha Item</h4>
                        <div class="divider"></div>
                        <p id="item-name">축하합니다!</p>
                        <p>레어 아이템 획득</p>
                        <div class="fold-line"></div>
                        <div class="fold-line"></div>
                    </div>
                </div>
            </div>
            <p id="result-text">캡슐을 획득했습니다!</p>
            <button onclick="closeModal()">닫기</button>
        </div>
    </div>

    <script src="main.js"></script>
</body>
</html>
