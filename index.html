<!DOCTYPE html>
<html lang="ko">
<head>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-V3YRZX5GQH"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-V3YRZX5GQH');
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PIXEL GACHA - Retro Face Simulator</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/galmuri/dist/galmuri.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="bg-photo"></div>

    <!-- 뮤직 플레이어 -->
    <div class="music-float">
        <div class="cd-player-panel">
            <div class="cd-body">
                <div class="cd-speaker-grid"></div>
                <canvas id="cd-canvas" width="80" height="80"></canvas>
                <div class="cd-strip"></div>
            </div>
            <button id="music-toggle" class="retro-btn cd-btn">PLAY</button>
        </div>
        <audio id="bgm" loop>
            <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
        </audio>
    </div>

    <!-- 감정 분석기 -->
    <div class="emotion-float">
        <section class="emotion-detection-panel">
            <h2 class="pixel-text emotion-title">EMOTION SCANNER</h2>
            <div class="emotion-controls">
                <button type="button" id="start-emotion" class="retro-btn">SCAN ON</button>
                <button type="button" id="stop-emotion" class="retro-btn" style="display:none;">SCAN OFF</button>
                <button type="button" id="capture-emotion" class="retro-btn" style="display:none;">CAPTURE</button>
            </div>
            <div class="radar-area">
                <canvas id="radar-canvas" width="240" height="240" style="display:none;"></canvas>
                <div id="captured-emotion-display" class="captured-emotion-display" style="display:none;">
    <canvas id="emotion-capture-canvas" width="240" height="240"></canvas>
    <p id="captured-emotion-result" class="pixel-text" style="font-size:18px; color:#111; margin-top:12px; font-weight:bold;"></p>
    <button type="button" id="rescan-emotion" class="retro-btn" style="margin-top:8px;">RESCAN</button>
</div>
            </div>
            <p id="emotion-recommendation" class="emotion-rec" style="display:none;"></p>
            <div id="webcam-container" style="display:none;"></div>
            <div id="label-container" style="display:none;"></div>
        </section>
    </div>

    <!-- 맥북 창 -->
    <div class="macbook-window">
        <div class="mac-titlebar">
            <div class="mac-dots">
                <span class="mac-dot red"></span>
                <span class="mac-dot yellow"></span>
                <span class="mac-dot green"></span>
            </div>
            <div class="mac-title">PIXEL GACHA</div>
        </div>

        <div class="window-content">
            <!-- 왼쪽: 버튼들 -->
            <section class="face-capture-panel">
                <h2 class="pixel-text">CAPTURE YOUR FACE</h2>
                <div class="capture-controls">
                    <p id="loading-status" class="pixel-text" style="font-size:7px;">AI loading...</p>
                    <button id="enable-camera" class="retro-btn" disabled>ON CAMERA</button>
                    <button id="take-photo" class="retro-btn" style="display:none;" disabled>TAKE PHOTO</button>
                    <input type="file" id="upload-photo" accept="image/*" style="display:none;">
                    <button id="trigger-upload" class="retro-btn" disabled>UPLOAD PHOTO</button>
                </div>
                <div class="video-container" style="display:none;">
                    <video id="video" width="120" height="90" autoplay playsinline></video>
                    <canvas id="canvas" width="120" height="90" style="display:none;"></canvas>
                </div>
                <p class="pixel-hint">REGISTER YOUR FACE<br>TO APPEAR IN GACHA!</p>
            </section>

            <!-- 가운데: 가챠 기계 -->
            <div class="main-play-area">
                <div class="machine-wrapper">
                    <section id="machine" class="machine-section">
                        <div class="gacha-machine">
                            <div class="cylinder-container">
                                <div class="cylinder-left-cap"></div>
                                <div class="cylinder-body">
                                    <div class="inner-capsules" id="inner-capsules"></div>
                                    <div class="cylinder-shine"></div>
                                </div>
                                <div class="cylinder-right-cap"></div>
                            </div>
                            <div class="machine-body">
                                <div class="machine-logo">GACHA</div>
                                <div class="machine-left">
                                    <div class="exit-door"><div class="exit-door-inner"></div></div>
                                    <div class="exit-slot"><div class="chute" id="chute"></div></div>
                                </div>
                                <div class="machine-right">
                                    <div class="coin-slot-area">
                                        <div class="coin-slot"></div>
                                        <div class="price-tag">500</div>
                                    </div>
                                    <div class="handle-area">
                                        <div class="handle" id="handle">
                                            <div class="handle-bar"></div>
                                            <div class="handle-center"></div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                            <div class="machine-base"></div>
                        </div>
                        <div class="controls">
                            <button id="spin-button" class="spin-btn">SPIN!</button>
                            <p class="instruction pixel-text">PUSH START BUTTON!</p>
                        </div>
                    </section>
                </div>
            </div>

            <!-- 오른쪽: 얼굴 미리보기 (원 1개만) -->
<div class="face-preview-panel">
    <div id="face-preview" class="face-preview"></div>
    <img id="captured-face" style="display:none; width:90px; height:90px; border-radius:50%; border:3px solid #ccc; margin:0 auto; display:block;">
    <p id="captured-emotion-text" class="pixel-text" style="display:none; color:#555; font-size:7px; margin-top:6px; text-align:center;"></p>
</div>
        </div>
    </div>

    <footer class="main-footer">
        <p class="pixel-text">&copy; 2026 PIXEL GACHA SIMULATOR &nbsp; made by @suplztm</p>
    </footer>

    <div id="result-modal" class="modal">
        <div class="modal-content">
            <div id="capsule-result-container" class="capsule-result-container">
                <div id="capsule-top" class="capsule-half top"></div>
                <div id="capsule-bottom" class="capsule-half bottom"></div>
                <div id="result-paper" class="result-paper">
                    <div class="paper-content">
                        <h4 class="pixel-text">YOU GOT</h4>
                        <div class="divider"></div>
                        <p id="item-name" class="pixel-text">NEW FACE!</p>
                    </div>
                </div>
            </div>
            <button onclick="closeModal()" class="retro-btn">CLOSE</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/selfie_segmentation"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/body-segmentation"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="main.js"></script>
</body>
</html>
